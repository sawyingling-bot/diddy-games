<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 250px;
      background: #1c1c1c;
      overflow-y: auto;
      padding: 10px;
    }

    #gameFrame {
      flex: 1;
      border: none;
      background: black;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: #333;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>
<body>

<div id="sidebar"></div>

<iframe id="gameFrame"></iframe>

<script>
const games = [
  {
    name: "1.12",
    url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/master/offline/1.12.html"
  }
];

const sidebar = document.getElementById("sidebar");
const frame = document.getElementById("gameFrame");

games.forEach(game => {
  const btn = document.createElement("button");
  btn.textContent = game.name;

  btn.onclick = () => {
    frame.src = game.url; // 🔥 no fetch = no ]]>, no corruption
  };

  sidebar.appendChild(btn);
});
</script>

</body>
</html>
