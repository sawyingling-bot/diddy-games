<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Diddy’s Arcade</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* SIDEBAR */
    #sidebar {
      width: 260px;
      background: #1b1b1b;
      display: flex;
      flex-direction: column;
      transition: 0.2s;
    }

    #sidebar.hidden {
      width: 0;
      overflow: hidden;
    }

    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #222;
    }

    #hamburger {
      cursor: pointer;
      background: #333;
      padding: 6px 10px;
      border-radius: 6px;
      user-select: none;
    }

    #search {
      margin: 10px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      width: calc(100% - 20px);
    }

    #games {
      overflow-y: auto;
      padding: 10px;
      flex: 1;
    }

    .card {
      background: #2a2a2a;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      cursor: pointer;
    }

    .card:hover {
      background: #3a3a3a;
    }

    /* MAIN AREA */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #gamebar {
      background: #222;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #frame {
      flex: 1;
      width: 100%;
      border: none;
      background: black;
    }

    button {
      background: red;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="topbar">
    <div id="hamburger">☰</div>
    <strong>Diddy’s Arcade</strong>
  </div>

  <input id="search" placeholder="search games...">

  <div id="games"></div>
</div>

<!-- MAIN GAME VIEW -->
<div id="main">
  <div id="gamebar">
    <span id="title">No game selected</span>
    <button onclick="closeGame()">Close</button>
  </div>

  <iframe id="frame"></iframe>
</div>

<script>
let games = [];

// sidebar toggle
document.getElementById("hamburger").onclick = () => {
  document.getElementById("sidebar").classList.toggle("hidden");
};

// load games
fetch("games.json")
  .then(r => r.json())
  .then(data => {
    games = data;
    render(data);
  })
  .catch(err => {
    document.getElementById("games").innerHTML =
      "<p style='color:red'>games.json failed to load</p>";
    console.log(err);
  });

function render(list){
  const g = document.getElementById("games");
  g.innerHTML = "";

  list.forEach(game => {
    const div = document.createElement("div");
    div.className = "card";
    div.textContent = game.name;

    div.onclick = () => {
      document.getElementById("frame").src = game.url;
      document.getElementById("title").textContent = game.name;
    };

    g.appendChild(div);
  });
}

// search
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  render(games.filter(g => g.name.toLowerCase().includes(q)));
});

function closeGame(){
  document.getElementById("frame").src = "";
  document.getElementById("title").textContent = "No game selected";
}
</script>

</body>
</html>
