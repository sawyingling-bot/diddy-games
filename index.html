<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arcade Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0c29;
  color: white;
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 260px;
  background: #1a1a2e;
  overflow-y: auto;
  padding: 10px;
}

.game {
  padding: 10px;
  margin: 5px 0;
  background: #2a2a40;
  cursor: pointer;
  border-radius: 8px;
}

.game:hover {
  background: #3a3a5a;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

header {
  padding: 10px;
  background: #111;
}

iframe {
  flex: 1;
  border: none;
  background: white;
}
</style>
</head>

<body>

<div class="sidebar" id="list">
  Loading games...
</div>

<div class="main">
  <header id="title">Select a game</header>
  <iframe id="frame"></iframe>
</div>

<script>
const repo = "CoolDude2349/Offline-HTML-Games-Pack";
const folder = "offline";

const listEl = document.getElementById("list");
const frame = document.getElementById("frame");
const title = document.getElementById("title");

async function loadGames() {
  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${folder}`);
    const files = await res.json();

    listEl.innerHTML = "";

    files
      .filter(f => f.name.endsWith(".html") || f.name.endsWith(".htm"))
      .forEach(file => {
        const div = document.createElement("div");
        div.className = "game";
        div.textContent = file.name.replace(".html","");

        div.onclick = async () => {
          title.textContent = file.name;
          const html = await fetch(file.download_url).then(r => r.text());
          frame.srcdoc = html;
        };

        listEl.appendChild(div);
      });

  } catch (e) {
    listEl.innerHTML = "Failed to load games.";
  }
}

loadGames();
</script>

</body>
</html>
